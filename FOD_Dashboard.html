<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FOD Inspection Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');
:root {
  --bg:#0a0e14; --surface:#111720; --surface2:#1a2230; --border:#1e2d42;
  --accent:#00c2ff; --accent2:#0077aa; --green:#00e676; --red:#ff3d5a;
  --yellow:#ffd740; --text:#e8f0f8; --text-dim:#6b8aaa;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:0 0 40px 0;}

/* HEADER */
.header{background:linear-gradient(135deg,#0d1b2e,#0a1520);border-bottom:2px solid var(--accent2);padding:18px 20px 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.header-left h1{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--accent);letter-spacing:.05em;text-transform:uppercase;}
.header-left p{font-size:11px;color:var(--text-dim);margin-top:2px;font-family:var(--mono);}
.refresh-btn{background:var(--accent2);border:none;color:white;padding:8px 16px;border-radius:6px;font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.refresh-btn:active{background:var(--accent);}
.refresh-btn.loading .spin{animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* MAIN */
.main{padding:16px;max-width:1100px;margin:0 auto;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 12px;text-align:center;}
.kpi-val{font-family:var(--mono);font-size:28px;font-weight:600;line-height:1;margin-bottom:4px;}
.kpi-lbl{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;}
.kpi.blue .kpi-val{color:var(--accent);}
.kpi.green .kpi-val{color:var(--green);}
.kpi.red .kpi-val{color:var(--red);}
.kpi.yellow .kpi-val{color:var(--yellow);}

/* PROGRESS */
.progress-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;}
.progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.progress-title{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);font-family:var(--mono);}
.progress-pct{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--accent);}
.progress-bar-bg{background:var(--surface2);border-radius:4px;height:12px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .8s ease;}
.progress-sub{margin-top:6px;font-size:11px;color:var(--text-dim);font-family:var(--mono);}

/* SECTION TITLE */
.section-title{font-family:var(--mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--text-dim);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.section-title .badge{background:var(--surface2);color:var(--accent);padding:2px 8px;border-radius:10px;font-size:10px;}

/* HAC GRID */
.hac-section{margin-bottom:16px;}
.hac-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
.hac-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 10px;}
.hac-name{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
.hac-mini-bar-bg{background:var(--surface2);border-radius:3px;height:6px;margin-bottom:6px;overflow:hidden;}
.hac-mini-bar-fill{height:100%;border-radius:3px;background:var(--green);}
.hac-mini-bar-fill.partial{background:var(--yellow);}
.hac-stats{display:flex;justify-content:space-between;align-items:center;}
.hac-count{font-family:var(--mono);font-size:11px;color:var(--text-dim);}
.hac-pct{font-family:var(--mono);font-size:11px;font-weight:600;}
.hac-pct.full{color:var(--green);}
.hac-pct.partial{color:var(--yellow);}
.hac-pct.zero{color:var(--text-dim);}

/* ROW COMPLETION */
.row-section{margin-bottom:16px;}
.row-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.row-card.complete{border-left:3px solid var(--green);}
.row-card.partial{border-left:3px solid var(--yellow);}
.row-card-header{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;user-select:none;}
.row-card-header:active{background:var(--surface2);}
.row-card.open .row-card-header{background:var(--surface2);}
.row-label{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text);}
.row-meta{display:flex;align-items:center;gap:10px;}
.row-count{font-family:var(--mono);font-size:12px;color:var(--text-dim);}
.row-pct-badge{font-family:var(--mono);font-size:12px;font-weight:600;min-width:40px;text-align:right;}
.row-pct-badge.full{color:var(--green);}
.row-pct-badge.partial{color:var(--yellow);}
.row-pct-badge.zero{color:var(--text-dim);}
.row-chevron{font-size:11px;color:var(--text-dim);transition:transform .2s;}
.row-card.open .row-chevron{transform:rotate(180deg);}
.row-mini-bar-bg{height:4px;background:var(--surface2);}
.row-mini-bar-fill{height:100%;background:var(--green);}
.row-mini-bar-fill.partial{background:var(--yellow);}
.row-ats-grid{display:none;padding:14px;border-top:1px solid var(--border);}
.row-card.open .row-ats-grid{display:block;}
.ats-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:5px;margin-bottom:10px;}
.ats-cell{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:600;border:1px solid transparent;position:relative;}
.ats-cell.done{background:#0a2015;border-color:#1a4025;color:var(--green);}
.ats-cell.missing{background:var(--surface2);border-color:var(--border);color:var(--text-dim);}
.ats-cell.mismatch{background:#200a10;border-color:#401020;color:var(--red);}
.ats-cell.deficiency{background:#1a1400;border-color:#3a3000;color:var(--yellow);}
.ats-cell.deficiency::after{content:'!';position:absolute;top:-3px;right:-3px;background:var(--yellow);color:#000;border-radius:50%;width:10px;height:10px;font-size:8px;display:flex;align-items:center;justify-content:center;}
.ats-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
.legend-item{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--text-dim);}
.legend-dot{width:10px;height:10px;border-radius:3px;}
.missing-section{border-top:1px solid var(--border);padding-top:10px;margin-top:4px;}
.missing-label{font-family:var(--mono);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.missing-chips{display:flex;flex-wrap:wrap;gap:5px;}
.missing-chip{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-family:var(--mono);font-size:11px;color:var(--text-dim);}
.all-done-msg{font-family:var(--mono);font-size:11px;color:var(--green);}

/* ALERTS */
.alert-section{margin-bottom:16px;}
.alert-card{border-radius:8px;padding:12px 14px;margin-bottom:8px;}
.alert-card.red{background:#1a0d12;border:1px solid #3d1520;border-left:3px solid var(--red);}
.alert-card.yellow{background:#1a1400;border:1px solid #3d3000;border-left:3px solid var(--yellow);}
.alert-title{font-family:var(--mono);font-size:13px;font-weight:600;margin-bottom:6px;}
.alert-card.red .alert-title{color:var(--red);}
.alert-card.yellow .alert-title{color:var(--yellow);}
.alert-row{display:flex;gap:8px;font-family:var(--mono);font-size:11px;margin-top:3px;}
.alert-lbl{color:var(--text-dim);width:55px;flex-shrink:0;}
.alert-val{color:var(--text);word-break:break-all;}
.alert-val.bad{color:var(--red);}
.alert-val.good{color:var(--green);}
.no-issues{background:#0a1a10;border:1px solid #1a3a20;border-left:3px solid var(--green);border-radius:8px;padding:14px;font-family:var(--mono);font-size:12px;color:var(--green);display:flex;align-items:center;gap:8px;}

/* TABLE */
.detail-section{margin-bottom:16px;}
.filter-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.filter-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:20px;font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s;}
.filter-btn.active{background:var(--accent2);border-color:var(--accent);color:white;}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:var(--surface2);padding:10px 12px;text-align:left;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);border-bottom:1px solid var(--border);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr.mm-row{background:#140a0d;}
tbody tr.def-row{background:#14110a;}
td{padding:10px 12px;font-family:var(--mono);font-size:11px;vertical-align:middle;}
td.title-col{color:var(--accent);font-weight:600;}
td a{color:var(--accent2);text-decoration:none;font-size:10px;}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;}
.tag.ok{background:#0a2015;color:var(--green);border:1px solid #1a4025;}
.tag.bad{background:#200a10;color:var(--red);border:1px solid #401020;}
.tag.warn{background:#1a1400;color:var(--yellow);border:1px solid #3a3000;}
.empty-state{padding:32px;text-align:center;color:var(--text-dim);font-family:var(--mono);font-size:12px;}
.last-updated{text-align:center;font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-top:8px;}

@media(max-width:600px){
  .kpi-row{grid-template-columns:repeat(3,1fr);}
  .kpi-val{font-size:20px;}
  .ats-grid{grid-template-columns:repeat(9,1fr);}
  thead th:nth-child(5),td:nth-child(5),thead th:nth-child(6),td:nth-child(6){display:none;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>FOD Inspection</h1>
    <p>TeraWulf Lake Mariner &middot; DH1</p>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">
    <span class="spin">&#8635;</span> Refresh
  </button>
</div>

<div class="main">

  <div class="kpi-row">
    <div class="kpi blue"><div class="kpi-val" id="kpi-total">0</div><div class="kpi-lbl">Inspected</div></div>
    <div class="kpi green"><div class="kpi-val" id="kpi-match">0</div><div class="kpi-lbl">S/N Match</div></div>
    <div class="kpi red"><div class="kpi-val" id="kpi-mismatch">0</div><div class="kpi-lbl">Mismatch</div></div>
    <div class="kpi yellow"><div class="kpi-val" id="kpi-hacs">0</div><div class="kpi-lbl">HACs Active</div></div>
    <div class="kpi red"><div class="kpi-val" id="kpi-deficiency">0</div><div class="kpi-lbl">Deficiencies</div></div>
  </div>

  <div class="progress-card">
    <div class="progress-header">
      <span class="progress-title">Overall Progress</span>
      <span class="progress-pct" id="prog-pct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
    <div class="progress-sub" id="prog-sub"></div>
  </div>

  <div class="hac-section">
    <div class="section-title">HAC Breakdown <span class="badge" id="hac-badge"></span></div>
    <div class="hac-grid" id="hac-grid"></div>
  </div>

  <div class="row-section">
    <div class="section-title">Row Completion <span class="badge" id="rows-badge"></span></div>
    <div id="row-list"></div>
  </div>

  <div class="alert-section">
    <div class="section-title">Serial # Mismatches <span class="badge" id="mm-badge" style="color:var(--red)"></span></div>
    <div id="mismatch-list"></div>
  </div>

  <div class="alert-section">
    <div class="section-title">Deficiencies <span class="badge" id="def-badge"></span></div>
    <div id="deficiency-list"></div>
  </div>

  <div class="detail-section">
    <div class="section-title">Inspection Records</div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('mismatch',this)">&#9888; Mismatches</button>
      <button class="filter-btn" onclick="setFilter('deficiency',this)">&#9889; Deficiencies</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Unit</th><th>Existing S/N</th><th>New S/N</th>
            <th>Match</th><th>Defic.</th><th>Date</th><th>Doc</th>
          </tr>
        </thead>
        <tbody id="records-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="last-updated" id="last-updated"></div>
</div>

var allRecords = [];
var currentFilter = 'all';
var TOTAL = 432;

function normalize(raw){
  // Handle raw SharePoint REST format
  if(raw.Title !== undefined && raw.SerialNumber !== undefined){
    return {
      title: raw.Title || '',
      dh: parseInt(raw.DataHall) || 0,
      hac: parseInt(raw.HAC) || 0,
      row: parseInt(raw.Row) || 0,
      ats: parseInt(raw.ATS) || 0,
      sn: (raw.SerialNumber || '').trim(),
      snv: (raw.SerialNumberVerification || '').trim(),
      link: raw.Document_x0020_Link ? raw.Document_x0020_Link.Url : '',
      created: raw.Created ? raw.Created.split('T')[0] : '',
      deficiency: (raw.Deficiencies || '').toLowerCase() === 'yes'
    };
  }
  // Already clean format
  return raw;
}
function isMatch(r){ 
  var n = normalize(r);
  return n.sn.toUpperCase() === n.snv.toUpperCase(); 
}

function render(){
  allRecords = allRecords.map(normalize);
  var total = allRecords.length;
  var mismatches = allRecords.filter(function(r){ return !isMatch(r); });
  var deficiencies = allRecords.filter(function(r){ return r.deficiency; });
  var hacs = [];
  allRecords.forEach(function(r){ if(hacs.indexOf(r.hac)<0) hacs.push(r.hac); });
  var pct = Math.round((total/TOTAL)*100);

  document.getElementById('kpi-total').textContent = total;
  document.getElementById('kpi-match').textContent = total - mismatches.length;
  document.getElementById('kpi-mismatch').textContent = mismatches.length;
  document.getElementById('kpi-hacs').textContent = hacs.length;
  document.getElementById('kpi-deficiency').textContent = deficiencies.length;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-sub').textContent = total + ' of ' + TOTAL + ' ATS units inspected - ' + (TOTAL-total) + ' remaining';
  document.getElementById('hac-badge').textContent = hacs.length + ' HACs';
  document.getElementById('last-updated').textContent = 'Updated - ' + new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});

  renderHACGrid();
  renderRowCompletion();
  renderAlerts('mismatch-list','mm-badge',mismatches,true);
  renderAlerts('deficiency-list','def-badge',deficiencies,false);
  renderTable();
}

function renderHACGrid(){
  var hacMap = {};
  allRecords.forEach(function(r){
    if(!hacMap[r.hac]) hacMap[r.hac]={total:0,mm:0};
    hacMap[r.hac].total++;
    if(!isMatch(r)) hacMap[r.hac].mm++;
  });
  var sorted = Object.keys(hacMap).map(Number).sort(function(a,b){return a-b;});
  var html='';
  sorted.forEach(function(h){
    var d=hacMap[h], pct=Math.round((d.total/36)*100);
    var pc=pct>=100?'':'partial', lc=pct>=100?'full':pct>0?'partial':'zero';
    var mm=d.mm>0?' <span style="color:#ff3d5a;font-size:10px">! '+d.mm+'</span>':'';
    html+='<div class="hac-card"><div class="hac-name">HAC '+h+mm+'</div>'
      +'<div class="hac-mini-bar-bg"><div class="hac-mini-bar-fill '+pc+'" style="width:'+Math.min(pct,100)+'%"></div></div>'
      +'<div class="hac-stats"><span class="hac-count">'+d.total+'/36</span><span class="hac-pct '+lc+'">'+pct+'%</span></div></div>';
  });
  document.getElementById('hac-grid').innerHTML=html;
}

function renderRowCompletion(){
  var doneMap={};
  allRecords.forEach(function(r){
    if(!doneMap[r.dh]) doneMap[r.dh]={};
    if(!doneMap[r.dh][r.row]) doneMap[r.dh][r.row]={};
    doneMap[r.dh][r.row][r.ats]=r;
  });
  var dhs=[];
  allRecords.forEach(function(r){if(dhs.indexOf(r.dh)<0)dhs.push(r.dh);});
  dhs.sort();
  var complete=0,total=0,html='';
  dhs.forEach(function(dh){
    var activeRows=Object.keys(doneMap[dh]).map(Number).sort(function(a,b){return a-b;});
    total+=activeRows.length;
    activeRows.forEach(function(rn){
      var da=doneMap[dh][rn], dc=Object.keys(da).length;
      var pct=Math.round((dc/18)*100), done=dc>=18;
      if(done) complete++;
      var sc=done?'complete':'partial', pc=done?'':'partial', lc=done?'full':'partial';
      var cells='';
      for(var n=1;n<=18;n++){
        var rec=da[n];
        if(!rec) cells+='<div class="ats-cell missing">'+n+'</div>';
        else if(rec.deficiency) cells+='<div class="ats-cell deficiency">'+n+'</div>';
        else if(!isMatch(rec)) cells+='<div class="ats-cell mismatch">'+n+'</div>';
        else cells+='<div class="ats-cell done">'+n+'</div>';
      }
      var missing=[];
      for(var n=1;n<=18;n++){if(!da[n])missing.push(n);}
      var mhtml=missing.length>0
        ?'<div class="missing-section"><div class="missing-label">Missing ATS</div><div class="missing-chips">'+missing.map(function(n){return'<span class="missing-chip">'+n+'</span>';}).join('')+'</div></div>'
        :'<div class="missing-section"><span class="all-done-msg">All 18 ATS inspected</span></div>';
      var id='rc-'+dh+'-'+rn;
      var hdr='<div class="row-card-header" data-rowid="'+id+'">';
      html+='<div class="row-card '+sc+'" id="'+id+'">'
        +hdr
        +'<span class="row-label">Row '+rn+'</span>'
        +'<div class="row-meta"><span class="row-count">'+dc+'/18</span><span class="row-pct-badge '+lc+'">'+pct+'%</span><span class="row-chevron">v</span></div>'
        +'</div>'
        +'<div class="row-mini-bar-bg"><div class="row-mini-bar-fill '+pc+'" style="width:'+pct+'%"></div></div>'
        +'<div class="row-ats-grid"><div class="ats-grid">'+cells+'</div>'
        +'<div class="ats-legend">'
        +'<div class="legend-item"><div class="legend-dot" style="background:#0a2015;border:1px solid #1a4025"></div>Done</div>'
        +'<div class="legend-item"><div class="legend-dot" style="background:#1a2230;border:1px solid #1e2d42"></div>Missing</div>'
        +'<div class="legend-item"><div class="legend-dot" style="background:#200a10;border:1px solid #401020"></div>Mismatch</div>'
        +'<div class="legend-item"><div class="legend-dot" style="background:#1a1400;border:1px solid #3a3000"></div>Deficiency</div>'
        +'</div>'+mhtml+'</div></div>';
    });
  });
  document.getElementById('row-list').innerHTML=html;
  document.getElementById('rows-badge').textContent=complete+'/'+total+' complete';
  document.getElementById('row-list').addEventListener('click',function(e){
    var hdr=e.target.closest('[data-rowid]');
    if(hdr) document.getElementById(hdr.getAttribute('data-rowid')).classList.toggle('open');
  });
}

function tog(id){document.getElementById(id).classList.toggle('open');}

function renderAlerts(elId,badgeId,items,isMM){
  var el=document.getElementById(elId);
  if(items.length===0){
    el.innerHTML='<div class="no-issues">'+(isMM?'All serial numbers match':'No deficiencies reported')+'</div>';
    document.getElementById(badgeId).textContent=isMM?'Clear':'None';
    document.getElementById(badgeId).style.color='#00e676';
    return;
  }
  document.getElementById(badgeId).textContent=items.length+(isMM?' issues':' items');
  document.getElementById(badgeId).style.color=isMM?'#ff3d5a':'#ffd740';
  var html='';
  items.forEach(function(r){
    var cls=isMM?'red':'yellow';
    var inner='<div class="alert-title">'+r.title+'</div>';
    if(isMM){
      inner+='<div class="alert-row"><span class="alert-lbl">Existing:</span><span class="alert-val bad">'+r.sn+'</span></div>'
            +'<div class="alert-row"><span class="alert-lbl">New S/N:</span><span class="alert-val good">'+r.snv+'</span></div>';
    } else {
      inner+='<div class="alert-row"><span class="alert-lbl">Date:</span><span class="alert-val">'+r.created+'</span></div>';
    }
    if(r.link) inner+='<div class="alert-row"><span class="alert-lbl">Doc:</span><span class="alert-val"><a href="'+r.link+'" target="_blank">View PDF</a></span></div>';
    html+='<div class="alert-card '+cls+'">'+inner+'</div>';
  });
  el.innerHTML=html;
}

function renderTable(){
  var rows=allRecords.slice();
  if(currentFilter==='mismatch') rows=rows.filter(function(r){return !isMatch(r);});
  if(currentFilter==='deficiency') rows=rows.filter(function(r){return r.deficiency;});
  var tbody=document.getElementById('records-tbody');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="7" class="empty-state">No records</td></tr>';return;}
  var html='';
  rows.forEach(function(r){
    var m=isMatch(r), rc=!m?'mm-row':r.deficiency?'def-row':'';
    html+='<tr class="'+rc+'">'
      +'<td class="title-col">'+r.title+'</td>'
      +'<td>'+r.sn+'</td>'
      +'<td class="'+(m?'':'no-match')+'">'+r.snv+'</td>'
      +'<td><span class="tag '+(m?'ok':'bad')+'">'+(m?'OK':'!!')+'</span></td>'
      +'<td>'+(r.deficiency?'<span class="tag warn">Yes</span>':'<span style="color:#6b8aaa">No</span>')+'</td>'
      +'<td>'+r.created+'</td>'
      +'<td>'+(r.link?'<a href="'+r.link+'" target="_blank">PDF</a>':'-')+'</td>'
      +'</tr>';
  });
  tbody.innerHTML=html;
}

function setFilter(f,btn){
  currentFilter=f;
  var btns=document.querySelectorAll('.filter-btn');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  renderTable();
}

function refreshData(){
  var btn=document.getElementById('refreshBtn');
  btn.classList.add('loading');
  btn.querySelector('span').textContent = '...';

  var SP_SITE = 'https://wbdiesel.sharepoint.com/teams/Teams-TeraWulfLakeMarinerDataCenter';
  var LIST = 'FOD Inspection';
  var SELECT = '$select=Title,DataHall,HAC,Row,ATS,SerialNumber,SerialNumberVerification,Document_x0020_Link,Deficiencies,Created';
  var url = SP_SITE + "/_api/web/lists/getbytitle('" + LIST + "')/items?" + SELECT + '&$top=500&$orderby=Created asc';

  fetch(url, {
    headers: { 'Accept': 'application/json;odata=verbose' },
    credentials: 'include'
  })
  .then(function(resp){
    if(!resp.ok) throw new Error('HTTP ' + resp.status);
    return resp.json();
  })
  .then(function(data){
    var items = data.d.results;
    allRecords = items.map(function(item){
      return {
        title: item.Title || '',
        dh: parseInt(item.DataHall) || 0,
        hac: parseInt(item.HAC) || 0,
        row: parseInt(item.Row) || 0,
        ats: parseInt(item.ATS) || 0,
        sn: (item.SerialNumber || '').trim(),
        snv: (item.SerialNumberVerification || '').trim(),
        link: item.Document_x0020_Link ? item.Document_x0020_Link.Url : '',
        created: item.Created ? item.Created.split('T')[0] : '',
        deficiency: (item.Deficiencies || '').toLowerCase() === 'yes'
      };
    });
    render();
    btn.classList.remove('loading');
    btn.querySelector('span').textContent = 'Refresh';
  })
  .catch(function(err){
    alert('Error loading data: ' + err.message + '. Using cached data.');
    allRecords = RECORDS.slice();
    render();
    btn.classList.remove('loading');
    btn.querySelector('span').textContent = 'Refresh';
  });
}

window.onload = function(){
  // Load embedded data immediately so dashboard shows right away
  allRecords = RECORDS.slice();
  render();
  // Then kick off a live refresh in the background
  var SP_SITE = 'https://wbdiesel.sharepoint.com/teams/Teams-TeraWulfLakeMarinerDataCenter';
  var LIST = 'FOD Inspection';
  var SELECT = '$select=Title,DataHall,HAC,Row,ATS,SerialNumber,SerialNumberVerification,Document_x0020_Link,Deficiencies,Created';
  var url = SP_SITE + "/_api/web/lists/getbytitle('" + LIST + "')/items?" + SELECT + '&$top=500&$orderby=Created asc';
  fetch(url, { headers: { 'Accept': 'application/json;odata=verbose' }, credentials: 'include' })
  .then(function(resp){ return resp.ok ? resp.json() : null; })
  .then(function(data){
    if(!data) return;
    var items = data.d.results;
    allRecords = items.map(function(item){
      return {
        title: item.Title || '',
        dh: parseInt(item.DataHall) || 0,
        hac: parseInt(item.HAC) || 0,
        row: parseInt(item.Row) || 0,
        ats: parseInt(item.ATS) || 0,
        sn: (item.SerialNumber || '').trim(),
        snv: (item.SerialNumberVerification || '').trim(),
        link: item.Document_x0020_Link ? item.Document_x0020_Link.Url : '',
        created: item.Created ? item.Created.split('T')[0] : '',
        deficiency: (item.Deficiencies || '').toLowerCase() === 'yes'
      };
    });
    render();
    document.getElementById('last-updated').textContent = 'Live data - ' + new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  })
  .catch(function(){ /* silent fail - embedded data already showing */ });
};
